# conf file for nsd
server:
	logfile: "nsd.log"
	pidfile: "nsd.pid"
	zonesdir: ""
	zonelistfile: "zone.list"
	xfrdfile: "nsd.xfrd"
	interface: 127.0.0.1
	verbosity: 5

zone:
	name: example.com.
	zonefile: soa_short_info.zone
	request-xfr: 127.0.0.1@TESTNS_PORT NOKEY
	allow-notify: 127.0.0.1/0 NOKEY
	provide-xfr: 127.0.0.1/0 NOKEY

zone:
	name: example2.com.
	zonefile: soa_short_info.zone2
	request-xfr: 127.0.0.1@TESTNS_PORT NOKEY
	allow-notify: 127.0.0.1/0 NOKEY
	provide-xfr: 127.0.0.1/0 NOKEY

zone:
	name: example3.com.
	zonefile: soa_short_info.zone3
